<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake: Obstacle Course</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Navigation Bar */
        nav {
            position: absolute;
            top: 30px;
            display: flex;
            gap: 25px;
            background: #34495e;
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        nav a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        nav a:hover {
            color: #f1c40f;
        }

        nav a.active {
            color: #2ecc71;
            border-bottom: 2px solid #2ecc71;
        }

        /* Game Layout */
        #game-container {
            position: relative;
            display: flex;
            gap: 20px;
            margin-top: 60px; /* Space for the Nav */
        }

        canvas {
            border: 4px solid #ecf0f1;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        #sidebar {
            width: 200px;
            padding: 20px;
            background: #34495e;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            transition: transform 0.1s, background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #2ecc71;
            transform: scale(1.05);
        }

        .hidden { display: none !important; }
        
        h1 { margin-bottom: 10px; letter-spacing: 2px; }
        h2 { margin-top: 0; color: #f1c40f; font-size: 1.2rem; }
        hr { border: 0; border-top: 1px solid #5d6d7e; margin: 15px 0; }
        ul { list-style: none; padding: 0; }
        li { margin: 8px 0; font-family: 'Courier New', monospace; font-size: 1.2rem; color: #bdc3c7; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="birdwatching.html">Birdwatching</a>
        <a href="snakegame.html" class="active">Snake Game</a>
    </nav>

    <div id="game-container">
        <div id="ui-layer">
            <h1 id="status-text">SNAKE</h1>
            <p id="sub-text">Avoid the red blocks!</p>
            <button id="start-btn">START GAME</button>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="sidebar">
            <h2>BEST TIMES</h2>
            <div id="current-timer">Current: 0.0s</div>
            <hr>
            <ul id="best-times-list">
                <li>--</li>
            </ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const uiLayer = document.getElementById("ui-layer");
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status-text");
        const timerDisplay = document.getElementById("current-timer");
        const bestTimesList = document.getElementById("best-times-list");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, obstacles, dx, dy, gameInterval, startTime;
        let bestTimes = JSON.parse(localStorage.getItem("snakeBestTimes")) || [];

        function initGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            obstacles = [];
            spawnFood();
            spawnObstacles(6); // Slightly more obstacles for challenge
            
            uiLayer.classList.add("hidden");
            startTime = Date.now();
            updateBestTimesUI();
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100);
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Ensure food doesn't spawn on obstacles
            if (obstacles.some(obs => obs.x === food.x && obs.y === food.y)) spawnFood();
        }

        function spawnObstacles(count) {
            for (let i = 0; i < count; i++) {
                obstacles.push({
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                });
            }
        }

        function gameLoop() {
            update();
            if (checkGameOver()) return;
            draw();
            updateTimer();
        }

        function update() {
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function checkGameOver() {
            const head = snake[0];
            const hitWall = head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
            const hitSelf = snake.slice(1).some(seg => seg.x === head.x && seg.y === head.y);
            const hitObstacle = obstacles.some(obs => obs.x === head.x && obs.y === head.y);

            if (hitWall || hitSelf || hitObstacle) {
                endGame();
                return true;
            }
            return false;
        }

        function endGame() {
            clearInterval(gameInterval);
            const duration = ((Date.now() - startTime) / 1000).toFixed(1);
            saveTime(duration);
            uiLayer.classList.remove("hidden");
            statusText.innerText = "GAME OVER";
            startBtn.innerText = "TRY AGAIN";
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Food
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

            // Obstacles
            ctx.fillStyle = "#e74c3c";
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x * gridSize + 1, obs.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });

            // Snake
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#5dade2" : "#3498db";
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function updateTimer() {
            if (dx === 0 && dy === 0) return;
            const current = ((Date.now() - startTime) / 1000).toFixed(1);
            timerDisplay.innerText = `Current: ${current}s`;
        }

        function saveTime(time) {
            bestTimes.push(parseFloat(time));
            bestTimes.sort((a, b) => b - a);
            bestTimes = bestTimes.slice(0, 5);
            localStorage.setItem("snakeBestTimes", JSON.stringify(bestTimes));
            updateBestTimesUI();
        }

        function updateBestTimesUI() {
            bestTimesList.innerHTML = bestTimes.length 
                ? bestTimes.map(t => `<li>${t}s</li>`).join("")
                : "<li>--</li>";
        }

        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp": if (dy !== 1) { dx = 0; dy = -1; } break;
                case "ArrowDown": if (dy !== -1) { dx = 0; dy = 1; } break;
                case "ArrowLeft": if (dx !== 1) { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });

        startBtn.addEventListener("click", initGame);
        updateBestTimesUI();
    </script>
</body>
</html>
